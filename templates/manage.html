{% extends "base.html" %}
{% block content %}
<div class="content-box">
    <h3 class="mb-4">如下是学生成绩表</h3>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="thead-dark">
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>语文</th>
                    <th>数学</th>
                    <th>英语</th>
                    <th>物理</th>
                    <th>化学</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for g in grades %}
                <tr>
                    <td>{{ g.student_id }}</td>
                    <td>{{ g.name }}</td>
                    <td>{{ g.chinese }}</td>
                    <td>{{ g.math }}</td>
                    <td>{{ g.english }}</td>
                    <td>{{ g.physics }}</td>
                    <td>{{ g.chemistry }}</td>
                    <td>
                        <a href="{{ url_for('edit_grade', id=g.id) }}" class="btn btn-sm btn-info">修改</a>
                        <a href="{{ url_for('delete_grade', id=g.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除该记录吗？')">删除</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="8" class="text-center">暂无成绩数据</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
