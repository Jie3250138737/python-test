{% extends "base.html" %}
{% block content %}
<div class="content-box">
    <h3 class="mb-4">请录入成绩</h3>
    <form method="POST" action="{{ url_for('add_grade') }}">
        <div class="row">
            <div class="col-md-6 form-group">
                <label>学号</label>
                <input type="text" class="form-control" name="student_id" required>
            </div>
            <div class="col-md-6 form-group">
                <label>姓名</label>
                <input type="text" class="form-control" name="name" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 form-group">
                <label>语文成绩</label>
                <input type="number" step="0.1" class="form-control" name="chinese" required>
            </div>
            <div class="col-md-4 form-group">
                <label>数学成绩</label>
                <input type="number" step="0.1" class="form-control" name="math" required>
            </div>
            <div class="col-md-4 form-group">
                <label>英语成绩</label>
                <input type="number" step="0.1" class="form-control" name="english" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 form-group">
                <label>物理成绩</label>
                <input type="number" step="0.1" class="form-control" name="physics" required>
            </div>
            <div class="col-md-6 form-group">
                <label>化学成绩</label>
                <input type="number" step="0.1" class="form-control" name="chemistry" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">提交</button>
    </form>
</div>
{% endblock %}
